    <style>
        /* 隐藏滚动条但保留滚动功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .shelf-bg {
            background-color: #8C4E33;
            background-image: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 140px,
                #6B3821 140px,
                #6B3821 150px
            );
        }

        .gradient-text {
            background: linear-gradient(to right, #ff4e50, #f9d423);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .slide-up-enter {
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .slide-up-enter-active {
            transform: translateY(0);
            animation: slideUp 0.3s ease-out forwards;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

                const exist = prev.find(p => p.id === product.id);

            setCart(prev => prev.map(item => {

                return item;
            }).filter(item => item.count > 0));

                case 'routes': return <RoutesPage openDetail={() => setShowDetail(true)} openArticle={() => setShowArticle(true)} goToAdopt={() => setActiveTab('adopt')} />;
                case 'adopt': return <AdoptPage openDiary={() => setShowDiary(true)} openAdoption={(item) => { setSelectedOrchard(item); setShowAdoptionModal(true); }} />;
                case 'shop': return <ShopPage />;
                case 'profile': return <ProfilePage />;
                default: return <HomePage />;
            }
        };

        return (
            <div className="w-full h-full relative font-sans text-gray-800 bg-white">
                {renderContent()}
                
                {/* 首页专属悬浮球: AI助手 */}
                {activeTab === 'home' && (
                    <div className="absolute bottom-[80px] right-4 z-30" onClick={() => setShowAIChat(true)}>
                        <div className="bg-gradient-to-r from-green-400 to-green-600 rounded-full p-1.5 shadow-[0_4px_12px_rgba(77,170,98,0.4)] flex items-center pr-4 cursor-pointer">
                            <div className="w-8 h-8 bg-white rounded-full flex items-center justify-center text-green-500 shadow-sm">
                                <Icons.Sparkles />
                            </div>
                            <span className="text-white text-sm font-bold ml-2">AI助手</span>
                        </div>
                    </div>
                )}

                <div className="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center py-2 pb-safe z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.02)]">
                    <div className={`flex flex-col items-center p-2 w-1/5 ${activeTab === 'home' ? 'text-green-600' : 'text-gray-400'}`} onClick={() => setActiveTab('home')}>
                        <Icons.Home active={activeTab === 'home'} />
                        <span className="text-[10px] mt-1 font-medium">首页</span>
                    </div>
                    <div className={`flex flex-col items-center p-2 w-1/5 ${activeTab === 'routes' ? 'text-green-600' : 'text-gray-400'}`} onClick={() => setActiveTab('routes')}>
                        <Icons.Compass active={activeTab === 'routes'} />
                        <span className="text-[10px] mt-1 font-medium">文旅产品</span>
                    </div>
                    <div className={`flex flex-col items-center p-2 w-1/5 ${activeTab === 'adopt' ? 'text-green-600' : 'text-gray-400'}`} onClick={() => setActiveTab('adopt')}>
                        <Icons.Leaf active={activeTab === 'adopt'} />
                        <span className="text-[10px] mt-1 font-medium">云认养</span>
                    </div>
                    <div className={`flex flex-col items-center p-2 w-1/5 ${activeTab === 'shop' ? 'text-green-600' : 'text-gray-400'}`} onClick={() => setActiveTab('shop')}>
                        <Icons.Gift active={activeTab === 'shop'} />
                        <span className="text-[10px] mt-1 font-medium">伴手礼</span>
                    </div>
                    <div className={`flex flex-col items-center p-2 w-1/5 ${activeTab === 'profile' ? 'text-green-600' : 'text-gray-400'}`} onClick={() => setActiveTab('profile')}>
                        <Icons.User active={activeTab === 'profile'} />
                        <span className="text-[10px] mt-1 font-medium">我的</span>
                    </div>
                </div>

                {showDetail && <DetailPage onClose={() => setShowDetail(false)} openBooking={() => setShowBooking(true)} />}
                {showArticle && <ArticlePage onClose={() => setShowArticle(false)} />}
                {showBooking && <BookingModal onClose={() => setShowBooking(false)} />}
                {showDiary && <GrowthDiaryModal onClose={() => setShowDiary(false)} />}
                
                {/* AI助手对话弹窗 */}
                {showAIChat && <AIChatModal onClose={() => setShowAIChat(false)} />}

                {/* 认养支付弹窗 */}
                {showAdoptionModal && <AdoptionModal item={selectedOrchard} onClose={() => setShowAdoptionModal(false)} />}
                
                {/* 村歌村清 弹窗 */}
                {showVillageSong && <VillageSongModal onClose={() => setShowVillageSong(false)} />}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
